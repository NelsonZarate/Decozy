services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - api


  api:
    build:
      context: ./backend
      dockerfile: ops/backend.Dockerfile
    volumes:
      - ./backend:/app/backend
      - /app/backend/.venv
      - ./backend/src/app/static/uploads:/app/backend/src/app/static/uploads
    networks:
      - app-network
    environment:
      DATABASE_DRIVER: ${database_driver}
      DATABASE_USERNAME: ${database_username}
      DATABASE_PASSWORD: ${database_password}
      DATABASE_HOST: ${database_host}
      DATABASE_PORT: ${database_port}
      DATABASE_NAME: ${database_name}
      NVIDIA_API_KEY: ${nvidia_api_key}
      OPENAI_API_KEY: ${openai_api_key}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_GOOGLE_CLIENT_SECRET: ${NEXT_PUBLIC_GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_GOOGLE_REDIRECT_URI: ${NEXT_PUBLIC_GOOGLE_REDIRECT_URI}
      GROQ_API_KEY: ${groq_api_key}
      GROQ_MODEL: ${groq_model}
      STRIPE_SECRET_KEY: ${stripe_secret_key}
      FRONTEND_URL: ${frontend_url}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ops/Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_GOOGLE_CLIENT_SECRET: ${NEXT_PUBLIC_GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_GOOGLE_REDIRECT_URI: ${NEXT_PUBLIC_GOOGLE_REDIRECT_URI}
    networks:
      - app-network
    depends_on:
      - api

  database:
    image: postgres:17
    restart: always
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${database_password}
      POSTGRES_USER: ${database_username}
      POSTGRES_DB: ${database_name}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${database_username} -d ${database_name}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      - app-network
  adminer:
    image: adminer:latest
    restart: always
    links:
      - database:database
    networks:
      - app-network
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  data:

networks:
  app-network:
    driver: bridge